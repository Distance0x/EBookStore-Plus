spring.application.name=ebookstore-backend

# ===============================================
# DATASOURCE (DataSourceAutoConfiguration)
# ===============================================
# JDBC URL of the database.
spring.datasource.url=jdbc:mysql://localhost:3306/ebookstore?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# Login user of the database.
spring.datasource.username=root
# Login password of the database.
spring.datasource.password=zzh20050312
# Fully qualified name of the JDBC driver. Auto-detected based on the URL for well-known drivers.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================================
# JPA (JpaBaseConfiguration, HibernateJpaAutoConfiguration)
# ===============================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===============================================
# SERVER
# ===============================================
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# Session??
server.servlet.session.timeout=1h
server.servlet.session.cookie.name=EBOOKSESSION
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.max-age=3600
server.servlet.session.cookie.path=/

# 
logging.level.com.ebookstore.ebookstorebackend.interceptor=INFO

# Kafka 
spring.kafka.bootstrap-servers=localhost:9092

# Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=all

# Consumer
spring.kafka.consumer.group-id=order-service
spring.kafka.consumer.enable-auto-commit=true
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer