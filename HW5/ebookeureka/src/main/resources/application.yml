server:
  port: 8040

spring:
  application:
    name: eureka-service

eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://localhost:8040/eureka
logging:
  level:
    com.netflix.eureka: INFO
    com.netflix.discovery: INFO